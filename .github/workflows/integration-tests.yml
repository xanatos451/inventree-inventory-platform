name: Extension Integration Tests

on:
  push:
    branches: [main]
    paths:
      - "chrome-multi-site-inventree-export/**"
      - "chrome-svg-capture-extension/**"
      - ".github/workflows/integration-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "chrome-multi-site-inventree-export/**"
      - "chrome-svg-capture-extension/**"
      - ".github/workflows/integration-tests.yml"

jobs:
  test-extension:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: chrome-multi-site-inventree-export

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Install Linux browser dependencies
        if: runner.os == 'Linux'
        run: npx playwright install-deps chromium

      - name: Run integration tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test:integration

      - name: Run integration tests (Windows)
        if: runner.os == 'Windows'
        run: npm run test:integration
