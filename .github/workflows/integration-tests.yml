name: Extension and InvenTree Plugin Tests

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "chrome-multi-site-inventree-export/**"
      - "chrome-svg-capture-extension/**"
      - "inventree-multi-site-importer/**"
      - "scripts/**"
      - ".gitignore"
      - ".editorconfig"
      - ".gitattributes"
      - "ARTIFACTS.md"
      - "CONTRIBUTING.md"
      - "justfile"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "chrome-multi-site-inventree-export/**"
      - "chrome-svg-capture-extension/**"
      - "inventree-multi-site-importer/**"
      - "scripts/**"
      - ".gitignore"
      - ".editorconfig"
      - ".gitattributes"
      - "ARTIFACTS.md"
      - "CONTRIBUTING.md"
      - "justfile"
  workflow_dispatch:

jobs:
  security-scan:
    name: Source secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Scan source for credential material
        run: python scripts/check_secrets.py

  javascript-syntax:
    name: JavaScript syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Check capture extension scripts
        working-directory: chrome-multi-site-inventree-export
        run: npm run test:syntax

      - name: Check SVG capture extension scripts
        run: |
          node --check chrome-svg-capture-extension/background.js
          node --check chrome-svg-capture-extension/popup.js

  extension-integration:
    name: Capture extension integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: chrome-multi-site-inventree-export

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: chrome-multi-site-inventree-export/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Install Linux browser dependencies
        if: runner.os == 'Linux'
        run: npx playwright install-deps chromium

      - name: Run integration tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test:integration

      - name: Run integration tests (Windows)
        if: runner.os == 'Windows'
        run: npm run test:integration

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-diagnostics-${{ matrix.os }}
          path: |
            .artifacts/playwright/report/
            .artifacts/playwright/test-results/
          if-no-files-found: ignore
          retention-days: 7

  inventree-plugin:
    name: InvenTree plugin contract (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    defaults:
      run:
        working-directory: inventree-multi-site-importer

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: inventree-multi-site-importer/pyproject.toml

      - name: Build and verify distributable wheel
        run: python scripts/build_plugin.py --clean

      - name: Compile plugin sources
        run: python -m compileall -q inventree_multi_site_importer

      - name: Run capture-contract and mapping tests
        run: python -m unittest discover -s tests -v

      - name: Upload plugin wheel
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: inventree-multi-site-importer-wheel
          path: .artifacts/plugin/*.whl
          if-no-files-found: error
          retention-days: 14
