name: Bug Report
description: Report a defect or regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear description of the problem.
      placeholder: What broke?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Exact steps to reproduce the issue.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: component
    attributes:
      label: Affected Component
      description: Which component is affected (capture extension, SVG extension, importer plugin, scripts)?
      placeholder: plugins/inventree-multi-site-importer
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser + OS
      placeholder: Chrome 127 on Windows 11
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste console output or attach screenshots.
